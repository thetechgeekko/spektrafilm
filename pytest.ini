[pytest]
testpaths = tests
addopts = -p no:napari -p no:napari-plugin-engine -p no:npe2
markers =
	slow: longer-running regression or integration coverage
	unit: fast local logic and data-shape checks with minimal mocking or I/O
	integration: cross-module, GUI, or runtime behavior checks that exercise composed flows
	regression: baseline or snapshot checks intended to detect drift over time
